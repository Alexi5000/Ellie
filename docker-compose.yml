services:
  ellie:
    build:
      context: .
      dockerfile: Dockerfile
    image: ellie-ai:production-hardening
    environment:
      NODE_ENV: production
      PORT: "5000"
      DATABASE_URL: mysql://ellie:ellie@127.0.0.1:3306/ellie_ci
      JWT_SECRET: dummy-ci-jwt-secret-change-before-production
      BUILT_IN_FORGE_API_URL: https://forge.local.invalid
      BUILT_IN_FORGE_API_KEY: dummy-ci-forge-key
      VITE_APP_TITLE: Ellie AI
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
