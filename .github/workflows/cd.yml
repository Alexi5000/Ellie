name: CD Pipeline

# Right-sized: this pipeline pushes images to a registry and deploys to remote
# servers over SSH. None of those targets/credentials exist for a normal push to
# main, so the pipeline no longer triggers on push to a branch. It runs on
# release tags (v*) and on manual dispatch. Every credential-dependent step is
# additionally guarded on the relevant secret being present, so a dispatch in a
# fork or an unconfigured repo is a clean no-op rather than a hard failure.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=tag
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix=sha-

    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    # Only attempt a deploy when a staging target is actually configured.
    if: ${{ github.event.inputs.environment == 'staging' || startsWith(github.ref, 'refs/tags/v') }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check for staging credentials
      id: creds
      run: |
        if [ -n "${{ secrets.STAGING_HOST }}" ]; then
          echo "configured=true" >> "$GITHUB_OUTPUT"
        else
          echo "configured=false" >> "$GITHUB_OUTPUT"
          echo "No STAGING_HOST secret set — skipping staging deploy."
        fi

    - name: Deploy to staging server
      if: steps.creds.outputs.configured == 'true'
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        script: |
          cd /opt/ellie
          git pull origin main
          docker compose pull
          docker compose up -d
          docker compose ps

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check for production credentials
      id: creds
      run: |
        if [ -n "${{ secrets.PRODUCTION_HOST }}" ]; then
          echo "configured=true" >> "$GITHUB_OUTPUT"
        else
          echo "configured=false" >> "$GITHUB_OUTPUT"
          echo "No PRODUCTION_HOST secret set — skipping production deploy."
        fi

    - name: Deploy to production server
      if: steps.creds.outputs.configured == 'true'
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        script: |
          cd /opt/ellie
          git fetch --tags
          git checkout ${{ github.ref_name }}
          docker compose pull
          docker compose up -d
          docker compose ps
